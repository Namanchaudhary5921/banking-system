spring.application.name=banking-system

# ---- Default profile: in-memory H2 for a zero-setup local demo ----
spring.datasource.url=jdbc:h2:file:./data/bankingdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

server.port=8080

# ---- To run against real PostgreSQL instead, comment out the H2 block
# ---- above and use the properties below (matches db/schema.sql):
# spring.datasource.url=jdbc:postgresql://localhost:5432/banking_system
# spring.datasource.driver-class-name=org.postgresql.Driver
# spring.datasource.username=banking_app
# spring.datasource.password=changeme
# spring.jpa.hibernate.ddl-auto=validate
# spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
